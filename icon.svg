<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3584e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5fb4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <g transform="translate(64,64)">
    <!-- Grid lines (window tiling) -->
    <rect x="-38" y="-38" width="30" height="30" rx="4" fill="white" opacity="0.9"/>
    <rect x="-4" y="-38" width="30" height="30" rx="4" fill="white" opacity="0.6"/>
    <rect x="-38" y="-4" width="30" height="30" rx="4" fill="white" opacity="0.6"/>
    <rect x="-4" y="-4" width="30" height="30" rx="4" fill="white" opacity="0.9"/>
    <!-- Center crosshair -->
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.95"/>
    <circle cx="0" cy="0" r="3" fill="#3584e4"/>
  </g>
</svg>
